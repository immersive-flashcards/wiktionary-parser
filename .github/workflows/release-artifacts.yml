name: Release Artifacts

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  run-and-attach:
    name: "Run parser and attach assets"
    runs-on: ubuntu-latest

    steps:
      - name: Check out code at the release tag
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: |
          uv sync --all-groups

      - name: Run wiktionary parser
        run: |
          uv run python src/wiktionary_to_csv.py release
          ls -R data/release_verb_csvs

      - name: Package CSV outputs per language
        run: |
          mkdir -p dist
          for dir in data/release_verb_csvs/*/; do
            lang=$(basename "$dir")
            archive="dist/${lang}-verb-csvs.tar.gz"
            echo "Packaging $dir into $archive"
            tar -czf "$archive" -C "$dir" .
          done
          ls -R dist

      - name: Upload archives to this release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: dist/*.tar.gz
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}